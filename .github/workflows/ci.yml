name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Check formatting
        run: |
          if [ -n "$(gofmt -s -l .)" ]; then
            echo "Code is not formatted. Run 'gofmt -s -w .'"
            gofmt -s -d .
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Test (vector conformance + fuzz seed + known cases)
        run: go test -race ./...

  # Builds the rust-stemmers oracle and proves it reproduces every committed
  # golden over the corpus — i.e. that the pinned version still matches the
  # expected outputs the Go port (the `go` job) is tested against. Together the
  # two jobs prove Go == committed goldens == rust-stemmers 1.2.0.
  oracle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build rustgen
        working-directory: rustgen
        run: cargo build --release
      - name: Oracle reproduces committed goldens
        run: |
          for pair in ar:arabic da:danish nl:dutch en:english fi:finnish \
                      fr:french ger:german el:greek hu:hungarian it:italian \
                      no:norwegian pt:portuguese ro:romanian ru:russian \
                      es:spanish sv:swedish ta:tamil tr:turkish; do
            ./rustgen/target/release/rustgen "${pair#*:}" < testdata/corpus.txt > /tmp/res.got
            diff -u "testdata/res_${pair%%:*}.txt" /tmp/res.got
          done
